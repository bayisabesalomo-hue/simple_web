        <title>IGAN Agripreneurship Bootcamp Signup</title>
        <link rel="stylesheet" href="style.css">

    <body>
        <div class="container">
            <div class="left">
                <h1>IGAN Agripreneurship Bootcamp</h1>
                <p> Empowering youth to lead the future of agriculture and innovation.</p>
            </div>
            <div class="right">
                <h2> Create an Account</h2>
                <p> Join the Agripreneurship Bootcamp today!</p>
                <form action="#"method="post" class="signup-form">
                    <div class="input-group">
                        <input type="text" placeholder="first Name" required>
                        <input type="text" placeholder="last Name" required>

                    </div>

                    <input type="email" placeholder="email adress"required>
                    <input type="password" placeholder="New password"required>
                    <label>Date of Birth</label>
                    <div class="input-group">
                        <input type="date"required>
                    </div>

                    <label>Gender</label>
                    <div class="gender-group">
                        <label><input type="radio" name="gender" value="male"required></label>
                        <label><input type="radio" name="gender" value="female"required></label>
                        <label><input type="radio" name="gender" value="other"required></label> 
                    </div>                    
                    <input id="password" type="password" ... />
                    <button type="button" id="togglePw">Show</button>
                     
                </form>

            </div>

        </div>
        <footer>
            <p> @ 2025 IGAN  |  Agripreneurship Boocamp for Youth</p>
        </footer>
