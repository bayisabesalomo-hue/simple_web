 <h1>Welcome to our  website</h1>
 <form >
    <div class="inputs">
      <div class="input_div">
        <label for="firstName">First Name</label>
        <input class="input" type="text" placeholder="your first Name here" > 
    </div>
    <div class="input_div"> 
        <label for="lastName">Last Name</label>
        <input class="input"  type="text" placeholder="your lastName here">
    </div> 
<!-- gender section -->
    <div class="input_div">

      <label for="gender">Gender</label>

      <div class="gender">
        <input type="radio" name="gender" id="gender" value="male">
      <label for="male">male</label>
      
      </div>


      <div class="gender">
        <input type="radio" name="gender" id="gender" value="female">
      <label for="female">female</label>
      </div>
      
    </div>
    <!-- skills section -->
    <div class="input_div">
      <label for="skills">Skills</label>
      <div class="skills">
        <input type="checkbox" name="data_science" value="data_science">
        <label for="data_science">Data Science</label>

      </div>
      <div class="skills">
        <input type="checkbox" name="data_analysis" value="data_analysis">
        <label for="data_analysis">Data Analysis</label>
        
      </div>
      <div class="skills">
        <input type="checkbox" name="software_engineering" value="software_engineering">
        <label for="software_engineering">Software Engineering</label>

      </div>

    </div>
    <!-- Country section -->
    <div class="input_div">
      <label for="Country">Country:</label>
      <select name="Country" id="country" class="input">
      <option value="">Select Country-----</option>
      <option value="rwanda">Rwanda</option>
      <option value="burundi">Burundi</option>
      <option value="uganda">Uganda</option>


      </select>
      

    </div>
    <!-- file section -->
    <div class="input_div">
      <label for="cv">Upload your CV</label>
      <input type="file">

    </div>
    <div class="input_div">
        <label for="email">Email</label>
        <input class="input"   type="email" placeholder="example@gmail.com">
    </div>
    <div class="input_div">
        <label for="password">password</label>
        <input class="input"  type="password" placeholder="password">
    </div> 
    <button > submit </button>
    </div>
</form>
